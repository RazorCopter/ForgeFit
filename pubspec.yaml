name: my_training_log
description: "A comprehensive training log app with daily routines and rest timers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # For the circular timer, we will use a standard AnimatedBuilder, no extra packages strictly required, 
  # or we use an external one if we want. We'll stick to native widgets for simplicity.
  cupertino_icons: ^1.0.2
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  url_launcher: ^6.2.6
  youtube_player_iframe: ^5.1.2
  file_picker: ^8.0.0
  file_saver: ^0.3.1
  http: ^1.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icona.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icona.png
